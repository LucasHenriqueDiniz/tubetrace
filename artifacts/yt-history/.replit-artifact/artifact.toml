kind = "web"
previewPath = "/"
title = "YouTube History Analyzer"
version = "1.0.0"
id = "artifacts/yt-history"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20122

[services.development]
run = "pnpm --filter @workspace/yt-history run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yt-history", "run", "build" ]
publicDir = "artifacts/yt-history/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20122"
BASE_PATH = "/"
