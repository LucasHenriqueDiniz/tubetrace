<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF3C00"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow blob left -->
  <circle cx="200" cy="400" r="220" fill="#FF3C00" fill-opacity="0.12" filter="url(#glow)"/>
  <!-- Glow blob right -->
  <circle cx="1050" cy="200" r="180" fill="#FF8C00" fill-opacity="0.08" filter="url(#glow)"/>

  <!-- Bar chart illustration (right side) -->
  <g opacity="0.35">
    <rect x="760" y="380" width="48" height="160" rx="6" fill="#FF3C00"/>
    <rect x="820" y="310" width="48" height="230" rx="6" fill="#FF5500"/>
    <rect x="880" y="250" width="48" height="290" rx="6" fill="#FF3C00"/>
    <rect x="940" y="340" width="48" height="200" rx="6" fill="#FF6600"/>
    <rect x="1000" y="280" width="48" height="260" rx="6" fill="#FF3C00"/>
    <rect x="1060" y="200" width="48" height="340" rx="6" fill="#FF4500"/>
    <rect x="1120" y="300" width="48" height="240" rx="6" fill="#FF3C00"/>
  </g>

  <!-- Logo / Icon -->
  <rect x="80" y="180" width="80" height="80" rx="16" fill="#FF3C00"/>
  <polygon points="108,196 108,244 148,220" fill="white"/>
  <circle cx="148" cy="188" r="14" fill="#FF3C00" stroke="white" stroke-width="2.5"/>
  <circle cx="148" cy="188" r="6" fill="white"/>

  <!-- Title -->
  <text x="80" y="316" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-2">TubeTrace</text>

  <!-- Accent line under title -->
  <rect x="80" y="332" width="360" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="388" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#ffffff" fill-opacity="0.65">
    Analyze your YouTube watch history
  </text>
  <text x="80" y="424" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#ffffff" fill-opacity="0.65">
    privately, right in your browser.
  </text>

  <!-- Feature pills -->
  <g font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">
    <!-- Pill 1 -->
    <rect x="80" y="460" width="168" height="40" rx="20" fill="#FF3C00" fill-opacity="0.2" stroke="#FF3C00" stroke-opacity="0.5" stroke-width="1"/>
    <text x="164" y="485" fill="#FF6633" text-anchor="middle">🎯 Personality</text>
    <!-- Pill 2 -->
    <rect x="264" y="460" width="168" height="40" rx="20" fill="#FF3C00" fill-opacity="0.2" stroke="#FF3C00" stroke-opacity="0.5" stroke-width="1"/>
    <text x="348" y="485" fill="#FF6633" text-anchor="middle">📊 Stats</text>
    <!-- Pill 3 -->
    <rect x="448" y="460" width="168" height="40" rx="20" fill="#FF3C00" fill-opacity="0.2" stroke="#FF3C00" stroke-opacity="0.5" stroke-width="1"/>
    <text x="532" y="485" fill="#FF6633" text-anchor="middle">🔒 100% Private</text>
  </g>

  <!-- URL bottom right -->
  <text x="1120" y="600" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ffffff" fill-opacity="0.3" text-anchor="end">tubetrace.pages.dev</text>
</svg>
