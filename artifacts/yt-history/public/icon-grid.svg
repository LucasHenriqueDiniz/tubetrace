<svg width="960" height="1040" viewBox="0 0 960 1040" xmlns="http://www.w3.org/2000/svg">

  <!-- ─── Overall background ─── -->
  <rect width="960" height="1040" fill="#080C14"/>

  <!-- ─── Subtle grid texture ─── -->
  <g stroke="white" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="80"  x2="960" y2="80"/>
    <line x1="0" y1="200" x2="960" y2="200"/>
    <line x1="0" y1="320" x2="960" y2="320"/>
    <line x1="0" y1="440" x2="960" y2="440"/>
    <line x1="0" y1="560" x2="960" y2="560"/>
    <line x1="0" y1="680" x2="960" y2="680"/>
    <line x1="0" y1="800" x2="960" y2="800"/>
    <line x1="0" y1="920" x2="960" y2="920"/>
    <line x1="120" y1="0" x2="120" y2="1040"/>
    <line x1="240" y1="0" x2="240" y2="1040"/>
    <line x1="360" y1="0" x2="360" y2="1040"/>
    <line x1="480" y1="0" x2="480" y2="1040"/>
    <line x1="600" y1="0" x2="600" y2="1040"/>
    <line x1="720" y1="0" x2="720" y2="1040"/>
    <line x1="840" y1="0" x2="840" y2="1040"/>
  </g>

  <!-- ─── Title bar ─── -->
  <text x="480" y="50"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="13" font-weight="600" letter-spacing="5"
        text-anchor="middle" fill="white" fill-opacity="0.30">
    TUBETRACE — ICON EXPLORATION
  </text>

  <!-- ─── Cell dividers ─── -->
  <line x1="480" y1="80" x2="480" y2="1040" stroke="white" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="560" x2="960" y2="560"   stroke="white" stroke-opacity="0.07" stroke-width="1"/>

  <!-- ══════════════════════════════════════════
       ICON 1 — Trace Play  (top-left cell)
       Cell: x=0–480, y=80–560
       Center: (240, 320)  Icon 240×240 at (120,200)
       ══════════════════════════════════════════ -->
  <g transform="translate(120,200) scale(1.2)">
    <!-- Dark rounded background -->
    <rect width="200" height="200" rx="40" fill="#0F172A"/>

    <!-- Bold play triangle -->
    <path d="M46,42 L46,158 L150,100 Z" fill="#E84545"/>

    <!-- Data trail curve from tip -->
    <path d="M150,100 C166,94 172,120 156,144"
          stroke="#E84545" stroke-width="6" fill="none"
          stroke-linecap="round" stroke-opacity="0.60"/>

    <!-- Breadcrumb dots (history trace) -->
    <circle cx="157" cy="97"  r="6.5" fill="#FF7373"/>
    <circle cx="169" cy="114" r="5"   fill="#FF7373" fill-opacity="0.80"/>
    <circle cx="158" cy="138" r="3.8" fill="#FF7373" fill-opacity="0.55"/>
  </g>

  <!-- Label 1 -->
  <text x="240" y="478"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="18" font-weight="700" text-anchor="middle" fill="white" fill-opacity="0.85">
    Trace Play
  </text>
  <text x="240" y="502"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="12" text-anchor="middle" fill="white" fill-opacity="0.35" letter-spacing="1">
    play  ·  data trail  ·  history
  </text>

  <!-- Color swatch 1 -->
  <circle cx="228" cy="530" r="7" fill="#E84545"/>
  <circle cx="252" cy="530" r="7" fill="#0F172A" stroke="#E84545" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════════
       ICON 2 — Private Lens  (top-right cell)
       Cell: x=480–960, y=80–560
       Center: (720, 320)  Icon at (600,200)
       ══════════════════════════════════════════ -->
  <g transform="translate(600,200) scale(1.2)">
    <rect width="200" height="200" rx="40" fill="#0F172A"/>

    <!-- Thick circle ring (lens / local scope) -->
    <circle cx="100" cy="100" r="68" stroke="#06B6D4" stroke-width="14" fill="none"/>

    <!-- Inner bar chart (local analytics) -->
    <rect x="68"  y="118" width="16" height="32" rx="4" fill="white"/>
    <rect x="92"  y="96"  width="16" height="54" rx="4" fill="white"/>
    <rect x="116" y="108" width="16" height="42" rx="4" fill="white"/>
  </g>

  <!-- Label 2 -->
  <text x="720" y="478"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="18" font-weight="700" text-anchor="middle" fill="white" fill-opacity="0.85">
    Private Lens
  </text>
  <text x="720" y="502"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="12" text-anchor="middle" fill="white" fill-opacity="0.35" letter-spacing="1">
    lens  ·  analytics  ·  privacy
  </text>

  <!-- Color swatch 2 -->
  <circle cx="708" cy="530" r="7" fill="#06B6D4"/>
  <circle cx="732" cy="530" r="7" fill="#0F172A" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════════
       ICON 3 — Local Archive  (bottom-left)
       Cell: x=0–480, y=560–1040
       Center: (240, 800)  Icon at (120,680)
       ══════════════════════════════════════════ -->
  <g transform="translate(120,680) scale(1.2)">
    <rect width="200" height="200" rx="40" fill="#0F172A"/>

    <!-- Archive stack bars -->
    <rect x="24" y="34"  width="152" height="28" rx="6" fill="#8B5CF6" fill-opacity="0.70"/>
    <rect x="18" y="78"  width="164" height="28" rx="6" fill="#8B5CF6"/>
    <rect x="24" y="122" width="152" height="28" rx="6" fill="#8B5CF6" fill-opacity="0.82"/>

    <!-- Subtle top-edge highlight on each bar -->
    <rect x="24" y="34"  width="152" height="4" rx="3" fill="white" fill-opacity="0.12"/>
    <rect x="18" y="78"  width="164" height="4" rx="3" fill="white" fill-opacity="0.14"/>
    <rect x="24" y="122" width="152" height="4" rx="3" fill="white" fill-opacity="0.10"/>

    <!-- White play triangle on middle bar -->
    <path d="M77,83 L77,107 L122,95 Z" fill="white"/>
  </g>

  <!-- Label 3 -->
  <text x="240" y="958"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="18" font-weight="700" text-anchor="middle" fill="white" fill-opacity="0.85">
    Local Archive
  </text>
  <text x="240" y="982"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="12" text-anchor="middle" fill="white" fill-opacity="0.35" letter-spacing="1">
    database  ·  local  ·  secure
  </text>

  <!-- Color swatch 3 -->
  <circle cx="228" cy="1010" r="7" fill="#8B5CF6"/>
  <circle cx="252" cy="1010" r="7" fill="#0F172A" stroke="#8B5CF6" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════════
       ICON 4 — Timeline Pulse  (bottom-right)
       Cell: x=480–960, y=560–1040
       Center: (720, 800)  Icon at (600,680)
       ══════════════════════════════════════════ -->
  <g transform="translate(600,680) scale(1.2)">
    <rect width="200" height="200" rx="40" fill="#0F172A"/>

    <!-- Horizontal timeline baseline -->
    <line x1="22" y1="132" x2="166" y2="132"
          stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>

    <!-- Vertical pulse spike -->
    <line x1="100" y1="132" x2="100" y2="58"
          stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>

    <!-- Horizontal cap / crossbar -->
    <line x1="68"  y1="58" x2="132" y2="58"
          stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>

    <!-- Sub-tick marks -->
    <line x1="46"  y1="124" x2="46"  y2="140" stroke="#F59E0B" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
    <line x1="72"  y1="124" x2="72"  y2="140" stroke="#F59E0B" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
    <line x1="128" y1="124" x2="128" y2="140" stroke="#F59E0B" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
    <line x1="154" y1="124" x2="154" y2="140" stroke="#F59E0B" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>

    <!-- Timeline data dots -->
    <circle cx="46"  cy="132" r="6" fill="#F59E0B"/>
    <circle cx="72"  cy="132" r="6" fill="#F59E0B"/>
    <circle cx="100" cy="132" r="8" fill="#F59E0B"/>
    <circle cx="128" cy="132" r="6" fill="#F59E0B"/>
    <circle cx="154" cy="132" r="6" fill="#F59E0B"/>

    <!-- Peak dot at apex -->
    <circle cx="100" cy="58" r="8" fill="#F59E0B"/>

    <!-- Forward arrow at right -->
    <polyline points="158,122 172,132 158,142"
              stroke="#F59E0B" stroke-width="4.5" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Label 4 -->
  <text x="720" y="958"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="18" font-weight="700" text-anchor="middle" fill="white" fill-opacity="0.85">
    Timeline Pulse
  </text>
  <text x="720" y="982"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="12" text-anchor="middle" fill="white" fill-opacity="0.35" letter-spacing="1">
    timeline  ·  pulse  ·  patterns
  </text>

  <!-- Color swatch 4 -->
  <circle cx="708" cy="1010" r="7" fill="#F59E0B"/>
  <circle cx="732" cy="1010" r="7" fill="#0F172A" stroke="#F59E0B" stroke-width="1.5"/>

</svg>
