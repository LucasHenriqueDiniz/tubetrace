<svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0F172A"/>

  <!-- Thick circle lens ring (privacy = local scope) -->
  <circle cx="100" cy="100" r="68" stroke="#06B6D4" stroke-width="14" fill="none"/>

  <!-- Inner bar chart — local analytics, 3 bars aligned at y=150 -->
  <!-- bars: x=68 (w=16), x=92 (w=16), x=116 (w=16), gap=8 -->
  <rect x="68"  y="118" width="16" height="32" rx="4" fill="white"/>
  <rect x="92"  y="96"  width="16" height="54" rx="4" fill="white"/>
  <rect x="116" y="108" width="16" height="42" rx="4" fill="white"/>
</svg>
