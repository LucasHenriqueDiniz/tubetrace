<svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0F172A"/>

  <!-- Horizontal timeline baseline -->
  <line x1="22" y1="132" x2="166" y2="132"
        stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>

  <!-- Vertical pulse spike from center (the "peak event") -->
  <line x1="100" y1="132" x2="100" y2="58"
        stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>

  <!-- Horizontal top cap — completes the T / crossbar -->
  <line x1="68" y1="58" x2="132" y2="58"
        stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>

  <!-- Timeline tick marks (sub-beats, subtle) -->
  <line x1="46"  y1="124" x2="46"  y2="140" stroke="#F59E0B" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="72"  y1="124" x2="72"  y2="140" stroke="#F59E0B" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="128" y1="124" x2="128" y2="140" stroke="#F59E0B" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="154" y1="124" x2="154" y2="140" stroke="#F59E0B" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Data dots on the timeline -->
  <circle cx="46"  cy="132" r="6"   fill="#F59E0B"/>
  <circle cx="72"  cy="132" r="6"   fill="#F59E0B"/>
  <circle cx="100" cy="132" r="8"   fill="#F59E0B"/>
  <circle cx="128" cy="132" r="6"   fill="#F59E0B"/>
  <circle cx="154" cy="132" r="6"   fill="#F59E0B"/>

  <!-- Peak dot at top (the event apex) -->
  <circle cx="100" cy="58"  r="8"   fill="#F59E0B"/>

  <!-- Forward arrow at right end of timeline -->
  <polyline points="158,122 172,132 158,142"
            stroke="#F59E0B" stroke-width="4.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
